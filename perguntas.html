<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teste Logo + Busca</title>
  <style>
  body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.quiz-container {
  width: 400px;
  margin: 100px auto;
  padding: 20px;
  background: white;
  border-radius: 10px;
  text-align: center;
}

  button {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 100%;
  cursor: pointer;
}
    #proxima {
    display: none;
  }
  </style>
</head>
<body>
  <main>
   <div class="quiz-container">
    <h2 id="pergunta">Pergunta aparece aqui</h2>
  
    <div id="respostas">
      <!-- Botões das respostas -->
    </div>
  
    <button id="proxima">Próxima</button>
  </div>
  </main>

  <script>
    const perguntas = [
  {
    pergunta: "Qual a capital do Brasil?",
    respostas: ["Rio de Janeiro", "Brasília", "São Paulo"],
    correta: 1
  },
  {
    pergunta: "2 + 2 = ?",
    respostas: ["3", "4", "5"],
    correta: 1
  },
  {
    pergunta: "É um país da Europa...",
    respostas: ["Africa", "Irâ", " Azerbaijão"],
    correta: 2
  }
];

let indiceAtual = 0;

function mostrarPergunta() {
  const pergunta = perguntas[indiceAtual];

  document.getElementById("pergunta").innerText = pergunta.pergunta;

  const respostasDiv = document.getElementById("respostas");
  respostasDiv.innerHTML = "";

  pergunta.respostas.forEach((resp, i) => {
    const btn = document.createElement("button");
    btn.innerText = resp;
};
   function mostrarFeedback(acertou) {
  const container = document.querySelector(".quiz-container");

  container.innerHTML = `
    <h2>${acertou ? "✅ Acertou!" : "❌ Errou!"}</h2>
    <button onclick="proximaPergunta()">Continuar</button>
  `};

    btn.onclick = () => {
  if (i === pergunta.correta) {
    mostrarFeedback(true);
  } else {
    mostrarFeedback(false);
  }
};

    respostasDiv.appendChild(btn);
  });
}
function proximaPergunta() {
  indiceAtual++;

  if (indiceAtual < perguntas.length) {
document.querySelector(".quiz-container").innerHTML = `
  <h2 id="pergunta"></h2>
  <div id="respostas"></div>
  <button id="proxima" style="display:none;">Próxima</button>
`;
    
document.getElementById("proxima").onclick = () => {
  indiceAtual++;
  if (indiceAtual < perguntas.length) {
    mostrarPergunta();
    document.getElementById("proxima").style.display = "none";
  } else {
    alert("Fim do quiz!");
  }
};

mostrarPergunta();
  </script>
</body>
  <!--  @media (max-width:540px){
      #textbox{
        width: 85%;
      }
    } 
  -->
</html>
