<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin:0;
    }
    .quiz-container {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      color: #d9d9d9;
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      padding: 20px;
      box-sizing: border-box;
      text-align: center;
      position:relative;
      z-index:3;
    }
      button{
      display: block;
      font-size: 1rem;
      margin: 10px auto;
      padding: 10px;
      gap: 1.5vw;
      width: 50vw;
      min-width:190px;
      max-width:212px;
      cursor: pointer;
      border-radius:90px;
      background-color: #c2c2c2;
    }
  #background {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    filter: brightness(50%);
    position: absolute;
    z-index: 1;
    } 
    #pergunta{
      font-size: 1.2rem;
    }
    #alfredo {
      width: 60%;
    }
    .conquista {
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction: column;
      border-radius:15px;
      width: 70%;
      height: 35vh;
      background-color: #2f2f2f91;
      gap:5px;
    }
    .concTitle{
      font-size: 0.9rem;
    }
    .concmensage{
      margin:0px;
      margin-bottom: 4px;
    }
    
   @media (min-width: 480px){
     button{
      display: block;
      font-size: 1.2rem;
      margin: 10px auto;
      padding: 10px;
      gap: 1.5vw;
      width: 50vw;
      min-width:212px;
      max-width:260px;
      cursor: pointer;
    }
     #pergunta{
      font-size: 1.5rem;
    }
   }
  @media (min-width: 768px){
    button{
      display: block;
      font-size: 1.5rem;
      margin: 10px auto;
      padding: 10px;
      gap: 1.5vw;
      width: 50vw;
      min-width:260px;
      max-width:315px;
      cursor: pointer;
    }
     #pergunta{
      font-size: 2rem;
    }
    #respostas{
      width:600px;
    }
  }
    @media (min-width: 1200px){
      button{
      display: block;
      font-size: 2rem;
      margin: 10px auto;
      padding: 10px;
      gap: 1.5vw;
      width: 50vw;
      min-width:315px;
      max-width:425px;
      cursor: pointer;
    }
     #pergunta{
      font-size: 2.5rem;
    }
    }
  </style>
</head>

<body>
  <main>
     <img id="background" src="https://i.pinimg.com/originals/15/5b/d9/155bd98f77b8118488393496f1a95330.gif">
    <div class="quiz-container">
      <h2 id="pergunta"></h2>
      <div id="respostas"></div>
    </div>
  </main>

  <script>
    let pontuacao = 0;
    const perguntas = [
      {
        pergunta: "Qual a capital do Brasil?",
        respostas: [ {texto: "Rio de Janeiro", pontos: 2}, 
                    {texto: "Brasília", pontos: 4}, 
                    {texto:"São Paulo", pontos: 8},
                    {texto:"Venezuela", pontos: 100}],
                    correta: 1
      },
      {
        pergunta: "2 + 2 = ?",
        respostas: [ {texto: "3", pontos: 2}, 
                    {texto: "4", pontos: 4}, 
                    {texto:"5", pontos: 8},
                    {texto:"22", pontos: 100}],
                    correta: 1
      },
      {
        pergunta: "É um país da Europa...",
        respostas: [ {texto: "Africa", pontos: 2}, 
                    {texto: "Irã", pontos: 4}, 
                    {texto:"Russia", pontos: 8}],
                    correta: 2
      },
      {
        pergunta: "Qual o nome da clara do ovo?",
        respostas: [ {texto: "Gema", pontos: 2}, 
                    {texto: "Guema", pontos: 4}, 
                    {texto:"Clara", pontos: 8},
                    {texto:"Alfredooh", pontos: 99999}],
                    correta: 2
      }
    ];
    
    const special_mensage = {
      mensagem: "alfredohh", 
      pontosN: 99999
    }


    let indiceAtual = 0;

    function mostrarPergunta() {
      const pergunta = perguntas[indiceAtual];

      document.getElementById("pergunta").innerText = pergunta.pergunta;

      const respostasDiv = document.getElementById("respostas");
      respostasDiv.innerHTML = "";

      pergunta.respostas.forEach((resp, i) => {
        const btn = document.createElement("button");
        btn.innerText = resp.texto;

        btn.onclick = () => {
          pontuacao += resp.pontos; // 🔥 soma os pontos

          if (i === pergunta.correta) {
            mostrarFeedback(true);
          } else {
            mostrarFeedback(false);
          }
        };

        respostasDiv.appendChild(btn);
      });
    }

    function mostrarFeedback(acertou) {
      const container = document.querySelector(".quiz-container");

      container.innerHTML = `
        <h2>${acertou ? "✅ Acertou!" : "❌ Errou!"}</h2>
        <button onclick="proximaPergunta()">Continuar</button>
      `;
    }

    function proximaPergunta() {
      indiceAtual++;

      if (indiceAtual < perguntas.length) {
        document.querySelector(".quiz-container").innerHTML = `
          <h2 id="pergunta"></h2>
          <div id="respostas"></div>
        `;
        mostrarPergunta();
      } else {
        let mensagemFinal = "";
        if (pontuacao >= special_mensage.pontosN){
          mensagemFinal =mensagemFinal = `
        <div class="conquista">
          <h3 class="concTitle">🏆 Conquista Desbloqueada:</h3>
          <p class="concmensage">${special_mensage.mensagem}</p>
          <img id="alfredo" src="https://media.printables.com/media/prints/609705/images/4843766_f3a15f19-e7ee-4661-b553-2533084ac8fa_dcb27d2e-db17-433d-8f60-1d129843482d/thumbs/inside/1280x960/png/th-387312948.webp">
        </div>
      `;   }
        document.querySelector(".quiz-container").innerHTML = `
          <h2>🎉 Fim do quiz!</h2>
          <p>Sua pontuação foi: <strong>${pontuacao}</strong></p>
          ${mensagemFinal}
        `;
      }
    }

    mostrarPergunta();
  </script>
</body>
</html>
