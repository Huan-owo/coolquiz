<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teste Logo + Busca</title>
  <style>
    body{
      margin: 0;
    }
  #background {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    filter: brightness(30%);
    position: absolute;
    z-index: 1;
  } 
    H5{
      margin: 5px;
      margin-bottom: 15px;
      font-weight: normal !important;
    }
    H3{
      margin: 5px;
    }
    #textbox{
      width:90%;
      font-size: 1.2rem;
      text-align: center;
      position:relative;
      color:white;
      z-index:3;
    }
     #logo {
        user-select: none;
        display:flex;
        align-items: center;
        justify-content: center;
        background-color: rgb(39, 97, 170);
        color: white;
        border-radius: 90px;
        min-width:100px;
        max-width:120px;
        width: 45vw;
        height: 5vh;
        font-size: 1.2rem;
        position:relative;
        z-index: 3;
      }
     main{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5vw;  
        height: 100vh;
      }
    @media (min-width: 480px){
      #logo {
        background-color: rgb(170 39 39);
        user-select: none;
        color: white;
        border-radius: 90px;
        text-align: center;
        min-width:135px;
        width: 15vw;
        height:40px;
        font-size: 1.5rem;
      }
      main{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5vw;  
        height: 100vh;
      }
      #textbox{
      width:80%;
      font-size: 1.5rem;
      text-align: center;
      position:relative;
      color:white;
      z-index:3;
    }
    }
    @media (min-width: 768px){
      #logo {
        background-color: rgb(41 170 39);
        user-select: none;
        color: white;
        border-radius: 90px;
        text-align: center;
        min-width:175px;
        height:45px;
        font-size: 2rem;
      }
      main{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5vw;  
        height: 100vh;
      }
      #textbox{
      width:80%;
      font-size: 2rem;
      text-align: center;
      position:relative;
      color:white;
      z-index:3;
    }
    }
    @media (min-width: 1200px){
      #logo {
        background-color: rgb(137 39 170);
        user-select: none;
        color: white;
        border-radius: 90px;
        text-align: center;
        min-width:200px;
        height:58px;
        font-size: 2.5rem;
      }
      main{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5vw;  
        height: 100vh;
      }
      #textbox{
      width:80%;
      font-size: 2.5rem;
      text-align: center;
      position:relative;
      color:white;
      z-index:3;
    }
    }
  </style>
</head>
<body>
  <main>
    <img id="background" src="https://64.media.tumblr.com/69089741fc2a662cc042361683214150/tumblr_o0nt4dXsqp1s335jfo1_540.gif">
    <div id="textbox">
      <H3>Teste os seus conhecimentos!</H3> 
      <H5>Responda a perguntas desafiadoras</H5>
    </div>
    <a href="perguntas (corrigido).html">
      <div id="logo">
        Iniciar
      </div>
    </a>
    <div id="inputWrapper">
      <input type="text" placeholder="Digite algo aqui">
    </div>
  </main>

</body>

      #textbox{
        width: 85%;
      }
    } 
  -->
</html>
