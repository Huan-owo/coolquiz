<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Teste Logo + Busca</title>
  <style>
  #background {
    width: 100%;
    height: 100vh;
    object-fit: cover;
    filter: brightness(30%);
    position: absolute;
    z-index: 1;
  } 
    #textbox{
      width:80%;
      font-size: 2.5rem;
      text-align: center;
      position:relative;
      color:white;
      z-index:3;
    }
     #logo {
        user-select: none;
        display:flex;
        align-items: center;
        justify-content: center;
        background-color: rgb(39, 97, 170);
        color: white;
        border-radius: 90px;
        min-width:100px;
        width: 45vw;
        height: 5vh;
        font-size: 5rem;
        position:relative;
        z-index: 3;
      }
     main{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5vw;  
        height: 100vh;
      }
    <@MEDIA (min-width:450px){
      #logo {
        background-color: rgb(39, 97, 170);
        user-select: none;
        color: white;
        border-radius: 90px;
        text-align: center;
        min-width:100px;
        width: 15vw;
        font-size: 1.5rem;
      }
      main{
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5vw;  
        height: 100vh;
      }
    }
  </style>
</head>
<body>
  <main>
    <img id="background" src="https://64.media.tumblr.com/69089741fc2a662cc042361683214150/tumblr_o0nt4dXsqp1s335jfo1_540.gif">
    <div id="textbox">
      <strong>Teste os seus conheçimentos!</strong> </br> Responda a perguntas desafiadoras se for capaz.
    </div>
    <div id="logo" style="cursor: pointer;">
      Iniciar
    </div>
  
    <div id="inputWrapper">
      <input type="text" placeholder="Digite algo aqui">
    </div>
  </main>

  <script>
    const logo = document.getElementById('logo');
    const searchContainer = document.getElementById('inputWrapper');

    if (logo && searchContainer) {
        logo.addEventListener('click', () => {
            const isHidden = searchContainer.style.display === 'none';
            searchContainer.style.display = isHidden ? '' : 'none';
            console.log(isHidden ? "Mostrando a barra" : "Escondendo a barra");
        });
    }
  </script>
</body>
  <!..  @media (max-width:540px){
      #textbox{
        width: 85%;
      }
    } 
  ..!>
</html>
